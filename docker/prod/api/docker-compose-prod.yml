services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    environment:
      TZ: Asia/Seoul
    networks:
      - api-net

  kokomen-api-blue:
    image: samhap/kokomen-interview-api:prod
    container_name: kokomen-api-blue
    restart: on-failure:3
    expose:
      - "8080"
      - "8081"
    volumes:
      - ./app/logs:/logs
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      HOSTNAME: ${HOSTNAME}
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL_PROD: ${SPRING_DATASOURCE_URL_PROD}
      SPRING_DATASOURCE_USERNAME_PROD: ${SPRING_DATASOURCE_USERNAME_PROD}
      SPRING_DATASOURCE_PASSWORD_PROD: ${SPRING_DATASOURCE_PASSWORD_PROD}
      REDIS_PRIMARY_HOST_PROD: ${REDIS_PRIMARY_HOST_PROD}
      OPEN_AI_API_KEY: ${OPEN_AI_API_KEY}
      KAKAO_CLIENT_ID_PROD: ${KAKAO_CLIENT_ID_PROD}
      KAKAO_CLIENT_SECRET_PROD: ${KAKAO_CLIENT_SECRET_PROD}
      KAKAO_ADMIN_KEY_PROD: ${KAKAO_ADMIN_KEY_PROD}
      SUPERTONE_API_TOKEN: ${SUPERTONE_API_TOKEN}
      GOOGLE_CLIENT_ID_PROD: ${GOOGLE_CLIENT_ID_PROD}
      GOOGLE_CLIENT_SECRET_PROD: ${GOOGLE_CLIENT_SECRET_PROD}
      WIDGET_SECRET_KEY_PROD: ${WIDGET_SECRET_KEY_PROD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.kokomen.kr`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
      - "traefik.http.services.api.loadbalancer.healthcheck.path=/actuator/health"
      - "traefik.http.services.api.loadbalancer.healthcheck.port=8081"
      - "traefik.http.services.api.loadbalancer.healthcheck.interval=5s"
      - "traefik.http.services.api.loadbalancer.healthcheck.timeout=3s"
    networks:
      - api-net
    profiles:
      - blue

  kokomen-api-green:
    image: samhap/kokomen-interview-api:prod
    container_name: kokomen-api-green
    restart: on-failure:3
    expose:
      - "8080"
      - "8081"
    volumes:
      - ./app/logs:/logs
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      HOSTNAME: ${HOSTNAME}
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL_PROD: ${SPRING_DATASOURCE_URL_PROD}
      SPRING_DATASOURCE_USERNAME_PROD: ${SPRING_DATASOURCE_USERNAME_PROD}
      SPRING_DATASOURCE_PASSWORD_PROD: ${SPRING_DATASOURCE_PASSWORD_PROD}
      REDIS_PRIMARY_HOST_PROD: ${REDIS_PRIMARY_HOST_PROD}
      OPEN_AI_API_KEY: ${OPEN_AI_API_KEY}
      KAKAO_CLIENT_ID_PROD: ${KAKAO_CLIENT_ID_PROD}
      KAKAO_CLIENT_SECRET_PROD: ${KAKAO_CLIENT_SECRET_PROD}
      KAKAO_ADMIN_KEY_PROD: ${KAKAO_ADMIN_KEY_PROD}
      SUPERTONE_API_TOKEN: ${SUPERTONE_API_TOKEN}
      GOOGLE_CLIENT_ID_PROD: ${GOOGLE_CLIENT_ID_PROD}
      GOOGLE_CLIENT_SECRET_PROD: ${GOOGLE_CLIENT_SECRET_PROD}
      WIDGET_SECRET_KEY_PROD: ${WIDGET_SECRET_KEY_PROD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.kokomen.kr`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
      - "traefik.http.services.api.loadbalancer.healthcheck.path=/actuator/health"
      - "traefik.http.services.api.loadbalancer.healthcheck.port=8081"
      - "traefik.http.services.api.loadbalancer.healthcheck.interval=5s"
      - "traefik.http.services.api.loadbalancer.healthcheck.timeout=3s"
    networks:
      - api-net
    profiles:
      - green

  node:
    image: prom/node-exporter
    container_name: node
    restart: unless-stopped
    pid: host
    ports:
      - 9100:9100
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro'
    environment:
      TZ: Asia/Seoul
    networks:
      - api-net

  promtail:
    image: grafana/promtail
    container_name: promtail
    volumes:
      - ./promtail/promtail.yaml:/etc/promtail/promtail.yaml
      - ./app/logs:/logs/app
      - promtail-tmp:/tmp
    command:
      - "-config.file=/etc/promtail/promtail.yaml"
      - "-config.expand-env=true"
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      HOSTNAME: ${HOSTNAME}
    networks:
      - api-net

volumes:
  promtail-tmp:

networks:
  api-net:
    driver: bridge
