spring:
  profiles:
    include:
      - common-test
  main:
    lazy-initialization: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

open-ai:
  api-key: test_api_key
  evaluation-temperature: 0.2
  generation-temperature: 0.7
  feedback-temperature: 0.5

cors:
  allowed-origins: http://localhost:8080

oauth:
  kakao:
    client-id: test_client_id
    client-secret: test_client_secret
  google:
    client-id: test_google_client_id
    client-secret: test_google_client_secret

tosspayments:
  widget-secret-key: test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6
retry:
  tosspayments:
    max-attempts: 3
    initial-interval: 500
    multiplier: 2.0
    max-interval: 2000

supertone:
  api-token: mock-token

aws:
  root-question-s3-path: mock-path/
  next-question-s3-path: mock-path/
  resume-s3-path: mock-path/
  portfolio-s3-path: mock-path/
  company-s3-path: mock-path/
  bedrock:
    model-id: test-model-id
    proceed-max-tokens: 2048
    end-max-tokens: 2048
    answer-feedback-max-tokens: 1024
    resume-question-max-tokens: 2048
    resume-evaluation-max-tokens: 10000
    evaluation-temperature: 0.2
    generation-temperature: 0.7
    feedback-temperature: 0.5

---
# test
spring:
  config:
    activate:
      on-profile: test

---
# docs
spring:
  config:
    activate:
      on-profile: docs
